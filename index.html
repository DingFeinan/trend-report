<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商用车技术趋势研究报告库</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #080c14;
  color: #c8d6e5;
}

/* ===== Background Grid ===== */
.bg-grid {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== Particles Canvas ===== */
#particles {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}

/* ===== App Shell ===== */
.app { display: flex; height: 100vh; position: relative; z-index: 1; }

/* ===== Sidebar ===== */
.sidebar {
  width: 380px; min-width: 380px; height: 100vh;
  background: rgba(12,18,30,.92);
  border-right: 1px solid rgba(0,229,255,.12);
  display: flex; flex-direction: column;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.sidebar-header {
  padding: 24px 24px 16px;
  border-bottom: 1px solid rgba(0,229,255,.08);
}
.sidebar-header .logo {
  display: flex; align-items: center; gap: 10px;
}
.sidebar-header .logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #00e5ff, #006c8a);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #000;
}
.sidebar-header h1 {
  font-size: 17px; font-weight: 600; color: #e8edf4; letter-spacing: .5px;
}
.sidebar-header .subtitle {
  font-size: 11px; color: #5a7a9a; margin-top: 2px; letter-spacing: 1px;
  text-transform: uppercase;
}

/* Search */
.search-wrap {
  padding: 12px 24px; position: relative;
}
.search-wrap input {
  width: 100%; padding: 9px 12px 9px 36px;
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.06);
  border-radius: 6px; color: #c8d6e5; font-size: 13px; outline: none;
  transition: border-color .2s, background .2s;
}
.search-wrap input:focus {
  border-color: rgba(0,229,255,.35); background: rgba(255,255,255,.07);
}
.search-wrap input::placeholder { color: #3d5068; }
.search-wrap .search-icon {
  position: absolute; left: 36px; top: 50%; transform: translateY(-50%);
  color: #3d5068; font-size: 14px; pointer-events: none;
}
.search-clear {
  position: absolute; right: 36px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #5a7a9a; cursor: pointer;
  font-size: 16px; display: none; padding: 2px 6px; border-radius: 3px;
}
.search-clear:hover { color: #c8d6e5; background: rgba(255,255,255,.06); }

/* Stats bar */
.stats-bar {
  display: flex; gap: 16px; padding: 0 24px 12px;
  font-size: 11px; color: #3d5068;
}
.stats-bar span { display: flex; align-items: center; gap: 4px; }
.stats-bar .val { color: #00e5ff; font-weight: 600; }

/* Tree */
.tree-wrap {
  flex: 1; overflow-y: auto; padding: 0 0 20px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.06) transparent;
}
.tree-wrap::-webkit-scrollbar { width: 4px; }
.tree-wrap::-webkit-scrollbar-track { background: transparent; }
.tree-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.06); border-radius: 2px; }

/* Category */
.cat-item { border-bottom: 1px solid rgba(255,255,255,.03); }
.cat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 24px; cursor: pointer; user-select: none;
  transition: background .15s;
}
.cat-header:hover { background: rgba(0,229,255,.04); }
.cat-header .arrow {
  width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
  transition: transform .25s cubic-bezier(0.4, 0, 0.2, 1);
  color: #5a7a9a; font-size: 11px; flex-shrink: 0;
}
.cat-header.open .arrow { transform: rotate(90deg); color: #00e5ff; }
.cat-header .cat-num {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  background: rgba(0,229,255,.08); color: #00b8d4;
}
.cat-header .cat-title {
  font-size: 14px; font-weight: 500; color: #b8ccdf;
  transition: color .15s;
}
.cat-header.open .cat-title { color: #00e5ff; }
.cat-header .cat-count {
  margin-left: auto; font-size: 11px; color: #3d5068;
  background: rgba(255,255,255,.04); padding: 2px 8px; border-radius: 10px;
}

/* Sub items */
.sub-list { overflow: hidden; transition: max-height .4s cubic-bezier(0.4, 0, 0.2, 1); }
.sub-list.collapsed { max-height: 0 !important; }
.sub-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 24px 10px 44px; cursor: pointer;
  transition: background .15s; position: relative;
  border-left: 2px solid transparent;
}
.sub-item:hover { background: rgba(0,229,255,.03); }
.sub-item.active {
  background: rgba(0,229,255,.07); border-left-color: #00e5ff;
}
.sub-item .dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
  background: rgba(255,255,255,.2);
  transition: background .15s;
}
.sub-item.active .dot { background: #00e5ff; box-shadow: 0 0 8px rgba(0,229,255,.4); }
.sub-item .sub-text { flex: 1; min-width: 0; }
.sub-item .sub-title {
  font-size: 13px; color: #94a3b8; line-height: 1.5;
  transition: color .15s;
}
.sub-item.active .sub-title { color: #e2e8f0; }
.sub-item .sub-tags {
  font-size: 10px; color: #3d5068; margin-top: 3px;
  line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}
.sub-item .doc-icon {
  flex-shrink: 0; font-size: 12px; color: #3d5068; margin-top: 2px;
  font-weight: 600; transition: color .15s;
}
.sub-item:hover .doc-icon { color: #00e5ff; }

/* No results */
.no-results {
  padding: 40px 24px; text-align: center; color: #3d5068; font-size: 13px;
  display: none;
}

/* ===== Main Content ===== */
.content {
  flex: 1; display: flex; flex-direction: column; height: 100vh;
  background: rgba(8,12,20,.4);
}

/* Welcome screen */
.welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px;
}
.welcome-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, rgba(0,229,255,.1), rgba(0,108,138,.1));
  border: 1px solid rgba(0,229,255,.15);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 24px;
}
.welcome h2 { font-size: 22px; color: #b8ccdf; font-weight: 500; margin-bottom: 8px; }
.welcome p { font-size: 14px; color: #3d5068; max-width: 400px; line-height: 1.6; }

/* Doc Toolbar */
.doc-toolbar {
  display: none; align-items: center; gap: 12px;
  padding: 12px 20px;
  background: rgba(12,18,30,.85); border-bottom: 1px solid rgba(0,229,255,.08);
}
.doc-toolbar.visible { display: flex; }
.doc-toolbar .doc-title {
  font-size: 14px; font-weight: 500; color: #b8ccdf;
  flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.doc-toolbar .btn {
  padding: 6px 14px; border-radius: 5px; font-size: 12px; cursor: pointer;
  border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04);
  color: #c8d6e5; transition: all .15s; display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.doc-toolbar .btn:hover { background: rgba(0,229,255,.08); border-color: rgba(0,229,255,.25); }
.doc-toolbar .btn.download { background: rgba(0,229,255,.1); border-color: rgba(0,229,255,.2); color: #00e5ff; }
.doc-toolbar .btn.download:hover { background: rgba(0,229,255,.18); }
.doc-toolbar .btn.back { color: #5a7a9a; }

/* Doc container + iframe */
.doc-container { flex: 1; display: none; position: relative; }
.doc-container.visible { display: flex; }
.doc-container iframe {
  width: 100%; height: 100%; border: none; background: #fff;
}
.doc-fallback {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; padding: 40px; text-align: center;
}
.doc-fallback.visible { display: flex; }
.doc-fallback p { color: #3d5068; font-size: 14px; margin-bottom: 16px; }

/* ===== Mobile Toggle ===== */
.menu-toggle {
  display: none; position: fixed; top: 16px; left: 16px; z-index: 100;
  width: 40px; height: 40px; border-radius: 8px;
  background: rgba(12,18,30,.9); border: 1px solid rgba(0,229,255,.15);
  color: #00e5ff; font-size: 20px; cursor: pointer;
  backdrop-filter: blur(8px);
}

/* ===== Floating Action Buttons ===== */
.floating-actions {
  position: fixed; top: 20px; right: 20px; z-index: 50;
  display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
}
.update-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px;
  background: rgba(12,18,30,.88);
  border: 1px solid rgba(0,229,255,.2);
  border-radius: 8px;
  color: #00e5ff; font-size: 13px; cursor: pointer;
  backdrop-filter: blur(10px);
  transition: all .2s;
  font-family: inherit; white-space: nowrap;
}
.update-btn:hover {
  background: rgba(0,229,255,.1);
  border-color: rgba(0,229,255,.4);
  box-shadow: 0 0 20px rgba(0,229,255,.12);
}
.update-btn:active { transform: scale(.97); }
.update-btn .spinner {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(0,229,255,.2);
  border-top-color: #00e5ff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
.update-btn.loading .spinner { display: block; }
.update-btn.loading .btn-icon { display: none; }
.update-btn.loading { pointer-events: none; opacity: .8; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Version badge on tree items */
.version-badge {
  display: none; font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: rgba(0,229,255,.12); color: #00e5ff; margin-left: 6px;
  font-weight: 600; flex-shrink: 0;
}
.version-badge.show { display: inline-block; }
.sub-item.updated { animation: flash .6s ease; }
@keyframes flash {
  0%, 100% { background: transparent; }
  50% { background: rgba(0,229,255,.08); }
}

/* Toast notification */
.toast-container {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 200;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  padding: 12px 20px;
  background: rgba(12,22,36,.94);
  border: 1px solid rgba(0,229,255,.18);
  border-radius: 8px;
  color: #c8d6e5; font-size: 13px;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
  opacity: 0; transform: translateY(10px);
  transition: all .3s ease;
  pointer-events: auto;
  display: flex; align-items: center; gap: 10px;
  max-width: 480px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { border-color: rgba(0,229,255,.25); }
.toast .toast-icon { font-size: 18px; flex-shrink: 0; }
.toast .toast-close {
  margin-left: auto; background: none; border: none; color: #5a7a9a;
  cursor: pointer; font-size: 16px; padding: 2px 6px; flex-shrink: 0;
}
.toast .toast-close:hover { color: #c8d6e5; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .floating-actions { top: 12px; right: 12px; }
  .update-btn { padding: 8px 14px; font-size: 12px; }
  .sidebar {
    position: fixed; left: 0; top: 0; z-index: 99;
    transform: translateX(-100%); transition: transform .3s;
    width: 320px; min-width: 320px;
  }
  .sidebar.open { transform: translateX(0); }
  .menu-toggle { display: flex; align-items: center; justify-content: center; }
  .content { padding-left: 0; }
  .doc-toolbar { padding: 12px 12px 12px 56px; }
}
</style>
</head>
<body>

<!-- Background effects -->
<div class="bg-grid"></div>
<canvas id="particles"></canvas>

<!-- Mobile menu toggle -->
<button class="menu-toggle" onclick="toggleSidebar()" title="目录">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
</button>

<!-- Floating action buttons -->
<div class="floating-actions">
  <button class="update-btn" id="updateBtn" onclick="checkForUpdates()" title="检测报告最新版本">
    <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    <span class="spinner"></span>
    获取最新信息
  </button>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<div class="app">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">R</div>
        <div>
          <h1>商用车技术趋势研究报告库</h1>
          <div class="subtitle">Commercial Vehicle Technology Research</div>
        </div>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input type="text" id="searchInput" placeholder="搜索报告标题..." oninput="filterTree()">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">&times;</button>
    </div>

    <div class="stats-bar">
      <span>共 <span class="val" id="totalCount">0</span> 篇报告</span>
      <span>已选 <span class="val" id="selectedCount">0</span> 篇</span>
    </div>

    <div class="tree-wrap" id="treeWrap">
      <div class="no-results" id="noResults">未找到匹配的报告</div>
    </div>
  </aside>

  <!-- ===== Main Content ===== -->
  <main class="content" id="mainContent">
    <!-- Doc Toolbar -->
    <div class="doc-toolbar" id="docToolbar">
      <button class="btn back" onclick="closeReport()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        返回目录
      </button>
      <span class="doc-title" id="docTitle"></span>
      <a class="btn download" id="btnDownload" href="#" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        新窗口打开
      </a>
    </div>

    <!-- Report viewer -->
    <div class="doc-container" id="docContainer">
      <iframe id="docFrame" src="" title="报告内容"></iframe>
    </div>

    <!-- Fallback -->
    <div class="doc-fallback" id="docFallback">
      <p>报告文件尚未上传</p>
      <button class="btn" onclick="closeReport()" style="padding:8px 20px;">返回目录</button>
    </div>

    <!-- Welcome screen -->
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <h2>商用车技术趋势研究报告库</h2>
      <p>左侧目录浏览报告，点击标题即可查阅详细内容。覆盖新能源、智能驾驶、智能底盘、AI应用等七大技术领域。</p>
    </div>
  </main>
</div>

<script>
// ===== State =====
let activeItemId = null;
const API_TREE = 'https://api.github.com/repos/DingFeinan/trend-report/git/trees/master?recursive=1';

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// ===== Build Tree from GitHub Directory Structure =====
async function buildTree() {
  var wrap = document.getElementById('treeWrap');
  var noResults = document.getElementById('noResults');
  wrap.innerHTML = '<div style="padding:40px 24px;text-align:center;color:#3d5068;font-size:13px;">正在加载目录...</div>';

  try {
    var res = await fetch(API_TREE);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
    var allItems = data.tree || [];

    // Parse directory structure under reports/
    var cats = {}; // dirName -> { files: [...] }
    var CHINESE_NUM = ['一','二','三','四','五','六','七','八','九','十'];

    allItems.forEach(function(item) {
      // Discover category directories from tree entries (including empty ones)
      var treeMatch = item.path.match(/^reports\/([^\/]+)$/);
      if (treeMatch && item.type === 'tree') {
        var dn = treeMatch[1];
        if (!cats[dn]) cats[dn] = [];
        return;
      }
      // Match: reports/{dirname}/{filename}
      var m = item.path.match(/^reports\/([^\/]+)\/([^\/]+)$/);
      if (!m) return;
      var dirName = m[1];
      var fileName = m[2];
      if (!fileName.toLowerCase().endsWith('.html')) return;
      if (!cats[dirName]) cats[dirName] = [];
      cats[dirName].push({ name: fileName, path: item.path });
    });

    // Sort directory names by their number prefix
    var dirNames = Object.keys(cats).sort(function(a, b) {
      var na = parseInt(a) || 0;
      var nb = parseInt(b) || 0;
      return na - nb;
    });

    // Build HTML
    var html = '';
    var total = 0;
    var catIndex = 0;

    dirNames.forEach(function(dirName) {
      catIndex++;
      var files = cats[dirName];

      // Group files by base name (strip version V{n}) and pick latest
      var groups = {};
      files.forEach(function(f) {
        var stem = f.name.replace(/\.html$/i, '');
        var vMatch = stem.match(/[vV](\d+)$/);
        var version = vMatch ? parseInt(vMatch[1]) : 0;
        var base = vMatch ? stem.substring(0, vMatch.index) : stem;
        if (!groups[base] || version > groups[base].version) {
          groups[base] = { name: f.name, path: f.path, version: version };
        }
        // Also update if same version but shorter name (prefer non-versioned if v=0)
        if (version === groups[base].version && !vMatch) {
          groups[base] = { name: f.name, path: f.path, version: version };
        }
      });

      var groupKeys = Object.keys(groups).sort();
      var numItems = groupKeys.length;
      total += numItems;

      // Category num
      var catNum = catIndex <= 10 ? (CHINESE_NUM[catIndex - 1] || catIndex) : catIndex;
      // Strip number prefix from dir name for display
      var displayName = dirName.replace(/^\d+_/, '');

      var catId = 'cat' + catIndex;
      html += '<div class="cat-item" data-cat="' + catId + '">';
      html += '<div class="cat-header open" data-cat="' + catId + '" onclick="toggleCat(this)">';
      html += '<span class="arrow">▶</span>';
      html += '<span class="cat-num">' + catNum + '</span>';
      html += '<span class="cat-title">' + escapeHtml(displayName) + '</span>';
      html += '<span class="cat-count">' + numItems + '</span>';
      html += '</div>';

      var subHeight = Math.max(numItems, 1) * 54;
      html += '<div class="sub-list" style="max-height:' + subHeight + 'px" data-cat="' + catId + '">';

      if (numItems === 0) {
        html += '<div class="sub-item" style="cursor:default;color:#3d5068;font-size:12px;padding-left:44px;">（暂无报告）</div>';
      } else {
        groupKeys.forEach(function(base, idx) {
          var g = groups[base];
          var itemId = catId + '-' + (idx + 1);
          // Display name: base name without version
          var displayTitle = base;
          html += '<div class="sub-item" data-id="' + itemId + '" data-cat="' + catId + '" data-dir="' + escapeHtml(dirName) + '" data-file="' + escapeHtml(g.name) + '" data-title="' + escapeHtml(displayTitle) + '" onclick="selectReport(this)">';
          html += '<span class="dot"></span>';
          html += '<div class="sub-text">';
          html += '<div class="sub-title">' + escapeHtml(displayTitle) + '</div>';
          html += '</div>';
          html += '<span class="doc-icon">HTML</span>';
          html += '</div>';
        });
      }

      html += '</div>';
      html += '</div>';
    });

    html += '<div class="no-results" id="noResults">未找到匹配的报告</div>';
    wrap.innerHTML = html;
    document.getElementById('totalCount').textContent = total;
  } catch (err) {
    wrap.innerHTML = '<div style="padding:40px 24px;text-align:center;color:#e74c3c;font-size:13px;">加载失败：' + err.message + '</div>';
  }
}

// ===== Toggle Category =====
function toggleCat(header) {
  var catId = header.dataset.cat;
  var subList = document.querySelector('.sub-list[data-cat="' + catId + '"]');
  var isOpen = header.classList.contains('open');
  if (isOpen) {
    header.classList.remove('open');
    subList.classList.add('collapsed');
  } else {
    header.classList.add('open');
    subList.classList.remove('collapsed');
    var items = subList.querySelectorAll('.sub-item:not(.hidden)');
    subList.style.maxHeight = (Math.max(items.length, 1) * 54) + 'px';
  }
}

// ===== Select Report =====
function selectReport(el) {
  document.querySelectorAll('.sub-item.active').forEach(function(e) { e.classList.remove('active'); });
  el.classList.add('active');
  activeItemId = el.dataset.id;
  document.getElementById('selectedCount').textContent = '1';

  var title = el.dataset.title;
  var filePath = encodeURI('reports/' + el.dataset.dir + '/' + el.dataset.file);

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('docContainer').classList.add('visible');
  document.getElementById('docFallback').classList.remove('visible');
  document.getElementById('docToolbar').classList.add('visible');
  document.getElementById('docTitle').textContent = title;
  document.getElementById('btnDownload').href = filePath;
  document.getElementById('docFrame').src = filePath;

  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

// ===== Close Report =====
function closeReport() {
  document.getElementById('docContainer').classList.remove('visible');
  document.getElementById('docFallback').classList.remove('visible');
  document.getElementById('docToolbar').classList.remove('visible');
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('docFrame').src = '';
  document.getElementById('selectedCount').textContent = '0';
  document.querySelectorAll('.sub-item.active').forEach(function(e) { e.classList.remove('active'); });
  activeItemId = null;
}

// ===== Search =====
function filterTree() {
  var query = document.getElementById('searchInput').value.trim().toLowerCase();
  var clearBtn = document.getElementById('searchClear');
  var noResults = document.getElementById('noResults');
  var visibleCount = 0;
  clearBtn.style.display = query ? 'block' : 'none';

  document.querySelectorAll('.cat-item').forEach(function(catItem) {
    var catId = catItem.dataset.cat;
    var subList = document.querySelector('.sub-list[data-cat="' + catId + '"]');
    var header = document.querySelector('.cat-header[data-cat="' + catId + '"]');
    var catVisible = 0;

    if (subList) {
      subList.querySelectorAll('.sub-item').forEach(function(el) {
        var title = (el.dataset.title || '').toLowerCase();
        var match = !query || title.includes(query);
        el.classList.toggle('hidden', !match);
        if (match) catVisible++;
      });

      if (query && catVisible > 0) {
        header.classList.add('open');
        subList.classList.remove('collapsed');
      }
      if (!query) {
        header.classList.add('open');
        subList.classList.remove('collapsed');
      }
      subList.style.maxHeight = (Math.max(catVisible, 1) * 54) + 'px';
    }

    catItem.style.display = (query && catVisible === 0) ? 'none' : '';
    visibleCount += catVisible;
  });

  noResults.style.display = (query && visibleCount === 0) ? 'block' : 'none';
  document.getElementById('totalCount').textContent = visibleCount;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  filterTree();
}

// ===== Sidebar Toggle (Mobile) =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ===== Particle Background =====
function initParticles() {
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var maxParticles = 50;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function Particle() {
    this.reset();
    this.y = Math.random() * canvas.height;
  }
  Particle.prototype.reset = function() {
    this.x = Math.random() * canvas.width;
    this.y = -10;
    this.size = Math.random() * 1.5 + 0.5;
    this.speed = Math.random() * 0.3 + 0.1;
    this.opacity = Math.random() * 0.4 + 0.1;
  };
  Particle.prototype.update = function() {
    this.y += this.speed;
    if (this.y > canvas.height + 10) this.reset();
  };
  Particle.prototype.draw = function() {
    ctx.fillStyle = 'rgba(0,229,255,' + this.opacity + ')';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  };

  for (var i = 0; i < maxParticles; i++) particles.push(new Particle());

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) { p.update(); p.draw(); });
    for (var i = 0; i < particles.length; i++) {
      for (var j = i + 1; j < particles.length; j++) {
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          ctx.strokeStyle = 'rgba(0,229,255,' + (0.04 * (1 - dist / 100)) + ')';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
}

// ===== Keyboard Shortcuts =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeReport();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ===== Click outside sidebar to close on mobile =====
document.addEventListener('click', function(e) {
  var sidebar = document.getElementById('sidebar');
  var toggle = document.querySelector('.menu-toggle');
  if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
    if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
      sidebar.classList.remove('open');
    }
  }
});

// ===== Toast Notification =====
function showToast(msg, type, duration) {
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  var icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
  t.className = 'toast ' + (type || '');
  t.innerHTML = '<span class="toast-icon">' + icon + '</span><span>' + msg + '</span><button class="toast-close" onclick="this.parentElement.remove()">&times;</button>';
  c.appendChild(t);
  requestAnimationFrame(function() { t.classList.add('show'); });
  setTimeout(function() { t.classList.remove('show'); setTimeout(function() { t.remove(); }, 300); }, duration || 4000);
}

// ===== Check for Updates (rebuild tree from GitHub) =====
async function checkForUpdates(silent) {
  var btn = document.getElementById('updateBtn');
  btn.classList.add('loading');

  try {
    oldTree = document.getElementById('treeWrap').innerHTML;
    await buildTree();
    if (!silent) showToast('目录已更新为最新状态', 'success', 3000);
  } catch (err) {
    if (!silent) showToast('更新失败：' + err.message, 'error', 5000);
  } finally {
    btn.classList.remove('loading');
  }
}

// ===== Init =====
buildTree();
initParticles();
</script>
